### INPUT ###
#############

input {
    kb_layout = us, ru, lt
    kb_variant =
    kb_model =
    kb_options = grp:win_space_toggle
    kb_rules =
    
    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = false
    }
}


gesture = 3, horizontal, workspace


device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

